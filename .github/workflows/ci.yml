name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # better-sqlite3 네이티브 모듈이 각 OS/Node 조합에 실제 설치되는지 여기서 검증된다
      - run: npm ci

      - run: npm run build

      - run: npm run typecheck

      - run: npm run lint

      # 테스트는 fixture 기반(네트워크 무의존)이라 CI에서 안정적으로 동작한다
      - run: npm test

  pack-smoke:
    name: pack smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # npm pack은 publish와 달리 prepublishOnly를 실행하지 않으므로 직접 빌드한다
      - run: npm run build

      # 실제 배포물(tarball)을 만들어 전역 설치 후 bin 연결과 CLI 실행을 검증한다
      - name: pack and global install
        shell: bash
        run: |
          npm pack
          npm install -g ./ai-news-supplier-*.tgz

      - name: smoke test installed CLI
        shell: bash
        run: |
          ains --version
          ains doctor
